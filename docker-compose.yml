services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CONTEXTCRAFT_DB_PATH=/data/contextcraft.db
    volumes:
      - contextcraft-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - CONTEXTCRAFT_API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  contextcraft-data:
